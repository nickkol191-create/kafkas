<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070d1a">
  <title>Επικοινωνία — ΚΑΥΚΑΣ</title>
  <meta name="description" content="Επικοινώνησε με την ομάδα του ΚΑΥΚΑΣ. Είμαστε εδώ για κάθε ερώτηση, παραγγελία ή υποστήριξη.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=2">
</head>
<body data-page="contact">
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumbs reveal in"><a href="index.html">Αρχική</a> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg> <span>Επικοινωνία</span></nav>
        <span class="eyebrow reveal in">Επικοινωνία</span>
        <h1 class="reveal in" data-delay="1" style="margin-top:14px">Πες μας πώς να βοηθήσουμε</h1>
        <p class="reveal in" data-delay="2">Η ομάδα μας απαντά συνήθως μέσα σε λίγες ώρες. Διαθέσιμο σε όλη την Ελλάδα.</p>
      </div>
    </section>

    <section class="section" style="padding-top:20px">
      <div class="container contact-grid">
        <div class="reveal">
          <div class="contact-cards" id="contactCards"></div>
        </div>

        <div class="checkout-section reveal" data-delay="1" style="margin:0">
          <div class="cs-head"><span class="cs-num">@</span><h3>Στείλε μήνυμα</h3></div>
          <form id="contactForm">
            <div class="field-row">
              <div class="field"><label>Όνομα <span class="req">*</span></label><input class="input" required placeholder="Το όνομά σου"></div>
              <div class="field"><label>Email <span class="req">*</span></label><input class="input" type="email" required placeholder="you@email.com"></div>
            </div>
            <div class="field"><label>Θέμα</label>
              <select class="select">
                <option>Γενική ερώτηση</option>
                <option>Παραγγελία & αποστολή</option>
                <option>Τεχνική υποστήριξη</option>
                <option>Επιστροφή / εγγύηση</option>
                <option>Συνεργασία</option>
              </select>
            </div>
            <div class="field"><label>Μήνυμα <span class="req">*</span></label><textarea class="textarea" required placeholder="Πώς μπορούμε να βοηθήσουμε;"></textarea></div>
            <button class="btn btn-accent btn-block btn-lg" type="submit" id="contactSubmit">Αποστολή μηνύματος</button>
          </form>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:0">
      <div class="container" style="max-width:820px">
        <div class="section-head center reveal"><span class="eyebrow">FAQ</span><h2>Συχνές ερωτήσεις</h2></div>
        <div id="faqList"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/data.js?v=2"></script>
  <script src="assets/js/main.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = [
        ['phone','Τηλέφωνο', STORE.phone, 'tel:'+STORE.phone.replace(/\s/g,'')],
        ['mail','Email', STORE.email, 'mailto:'+STORE.email],
        ['clock','Ωράριο', STORE.hours, ''],
        ['truck','Αποστολές', 'Σε όλη την Ελλάδα, 1–3 ημέρες', '']
      ];
      document.getElementById('contactCards').innerHTML = cards.map(c=>`
        <div class="contact-card">
          <div class="cc-ic">${icon(c[0])}</div>
          <div><h4>${c[1]}</h4><p>${c[3] ? `<a href="${c[3]}">${c[2]}</a>` : c[2]}</p></div>
        </div>`).join('');

      const faqs = [
        ['Πόσο κοστίζει η αποστολή;','Η αποστολή κοστίζει €3,90 και είναι δωρεάν για παραγγελίες άνω των €49. Η παράδοση γίνεται συνήθως σε 1–3 εργάσιμες ημέρες σε όλη την Ελλάδα.'],
        ['Μπορώ να πληρώσω με αντικαταβολή;','Ναι. Προσφέρουμε πληρωμή με κάρτα, PayPal και αντικαταβολή κατά την παράδοση (με μικρή επιβάρυνση).'],
        ['Τα προϊόντα έχουν εγγύηση;','Όλα τα προϊόντα είναι γνήσια και συνοδεύονται από επίσημη εγγύηση κατασκευαστή, καθώς και νόμιμη απόδειξη αγοράς.'],
        ['Πώς κάνω επιστροφή;','Έχεις 14 ημέρες για επιστροφή. Επικοινώνησε μαζί μας και θα κανονίσουμε την παραλαβή ή την αλλαγή του προϊόντος, με επιστροφή χρημάτων αν το επιθυμείς.'],
        ['Έχετε φυσικό κατάστημα;','Εξυπηρετούμε online σε όλη την Ελλάδα με γρήγορη αποστολή. Για οποιαδήποτε απορία, η ομάδα μας είναι διαθέσιμη '+STORE.hours+'.']
      ];
      document.getElementById('faqList').innerHTML = faqs.map((f,i)=>`
        <div class="faq-item reveal" data-delay="${(i%3)+1}">
          <button class="faq-q" aria-expanded="false">${f[0]}<span class="chev">${icon('chevDown')}</span></button>
          <div class="faq-a"><p>${f[1]}</p></div>
        </div>`).join('');

      document.querySelectorAll('.faq-item').forEach(item => {
        const q = item.querySelector('.faq-q'); const a = item.querySelector('.faq-a');
        q.addEventListener('click', () => {
          const open = item.classList.toggle('open');
          q.setAttribute('aria-expanded', open);
          a.style.maxHeight = open ? a.scrollHeight + 'px' : '0';
        });
      });

      document.getElementById('contactForm').addEventListener('submit', (e)=>{
        e.preventDefault();
        const b = document.getElementById('contactSubmit');
        b.disabled = true; b.textContent = 'Αποστολή…';
        setTimeout(()=>{ e.target.reset(); b.disabled=false; b.textContent='Αποστολή μηνύματος'; toast('Το μήνυμα στάλθηκε! Θα σου απαντήσουμε σύντομα.', 'mail'); }, 800);
      });

      scanReveal(document);
    });
  </script>
</body>
</html>
